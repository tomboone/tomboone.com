#file: noinspection UndefinedAction
name: Build and Deploy to Stage

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - 'index.html'
      - 'images/**'
      - 'records/**'
      - '.github/workflows/build-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true
  TF_WORKING_DIR: ./infrastructure

jobs:
  opentofu:
    name: OpenTofu
    runs-on: ubuntu-latest

    outputs:
      default_host_name: ${{ steps.get_outputs.outputs.default_host_name }}
      api_key: ${{ steps.get_outputs.outputs.api_key }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Log in to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: OpenTofu Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu init

      - name: OpenTofu Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tofu apply -auto-approve

      - name: Get OpenTofu Outputs
        id: get_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          DEFAULT_HOST_NAME=$(tofu output -raw default_host_name)
          API_KEY=$(tofu output -raw api_key)

          echo "default_host_name=$DEFAULT_HOST_NAME" >> "$GITHUB_OUTPUT"
          echo "api_key=$API_KEY" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Azure Static Web App
    runs-on: ubuntu-latest
    needs: opentofu
    environment: production

    env:
      API_KEY: ${{ needs.opentofu.outputs.api_key }}
      REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.API_KEY }}
          repo_token: ${{ env.REPO_TOKEN }}
          action: "upload"
          app_location: "/"
          output_location: "/"
          skip_app_build: true
